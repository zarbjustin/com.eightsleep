<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: transparent; color: #E8EEF4;
    }
    .card {
      box-sizing: border-box; height: 240px; padding: 12px 14px;
      background: linear-gradient(160deg, rgba(14,31,53,0.84) 0%, rgba(10,24,40,0.95) 100%), url('bg.jpg') center/cover no-repeat;
      border-radius: 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .top { display: flex; align-items: center; justify-content: space-between; }
    select {
      background: #14283f; color: #E8EEF4; border: 1px solid #24405e;
      border-radius: 8px; padding: 4px 8px; font-size: 13px; max-width: 60%;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #3a5572; display: inline-block; }
    .dot.on { background: #58d68d; box-shadow: 0 0 8px #58d68d88; }
    .temp { display: flex; align-items: center; justify-content: center; gap: 12px; }
    .temp .value { font-size: 34px; font-weight: 700; min-width: 94px; text-align: center; }
    .temp button {
      width: 40px; height: 40px; border-radius: 50%; border: 1px solid #24405e;
      background: #14283f; color: #E8EEF4; font-size: 22px; cursor: pointer;
    }
    .temp button:active { background: #1d3a57; }
    .stats {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px;
      font-size: 11px; color: #9fb4c9;
    }
    .stat {
      min-width: 0; border: 1px solid rgba(89,125,160,0.34);
      background: rgba(11,25,42,0.64); border-radius: 8px; padding: 5px 6px;
    }
    .stat b {
      display: block; color: #E8EEF4; font-size: 14px; line-height: 18px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .badges { display: flex; gap: 6px; justify-content: center; min-height: 18px; flex-wrap: wrap; }
    .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: #14283f; color: #9fb4c9; border: 1px solid #24405e;
    }
    .badge.warn { background: #5a2a1f; color: #f0b49b; border-color: #7a3a2a; }
    .badge.alarm { background: #1f3a5a; color: #9bc4f0; border-color: #2a4a7a; }
    .power {
      border: none; border-radius: 8px; padding: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; background: #24405e; color: #E8EEF4;
    }
    .power.on { background: #1f7a4d; }
    .muted { color: #9fb4c9; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <select id="side"></select>
      <span><span class="dot" id="presence"></span> <span class="muted" id="presenceLabel">—</span></span>
    </div>

    <div class="temp">
      <button id="down" type="button">−</button>
      <div class="value"><span id="target">—</span><span style="font-size:18px" id="unit">°C</span></div>
      <button id="up" type="button">+</button>
    </div>

    <div class="stats">
      <div class="stat">Bed<b id="bedTemp">—</b></div>
      <div class="stat">Room<b id="roomTemp">—</b></div>
      <div class="stat">Stage<b id="stage">—</b></div>
      <div class="stat">Live HR<b id="hr">—</b></div>
      <div class="stat">Rest HR<b id="restHr">—</b></div>
      <div class="stat">Sleep<b id="sleep">—</b></div>
    </div>

    <div class="badges" id="badges"></div>

    <button class="power" id="power" type="button">Power</button>
  </div>

  <script type="text/javascript">
    function onHomeyReady(Homey) {
      const el = (id) => document.getElementById(id);
      let currentId = null;
      let state = null;

      function render() {
        if (!state) return;
        const toF = (c) => (c * 9 / 5) + 32;
        const isF = state.units === 'F';
        el('unit').textContent = isF ? '°F' : '°C';
        const fmtTemp = (c) => (c == null ? '—' : (isF ? Math.round(toF(c)) : Number(c).toFixed(1)));
        el('target').textContent = fmtTemp(state.target);
        el('bedTemp').textContent = state.bedTemp == null ? '—' : (isF ? Math.round(toF(state.bedTemp)) + '°' : Number(state.bedTemp).toFixed(1) + '°');
        el('roomTemp').textContent = state.roomTemp == null ? '—' : (isF ? Math.round(toF(state.roomTemp)) + '°' : Number(state.roomTemp).toFixed(1) + '°');
        el('hr').textContent = state.heartRate == null ? '—' : Math.round(state.heartRate);
        el('restHr').textContent = state.restingHeartRate == null ? '—' : Math.round(state.restingHeartRate);
        el('stage').textContent = state.stage || '—';
        el('sleep').textContent = state.sleepFitness == null ? '—' : Math.round(state.sleepFitness);
        el('presence').className = 'dot' + (state.presence ? ' on' : '');
        el('presenceLabel').textContent = state.presence ? 'In bed' : 'Empty';
        const power = el('power');
        power.classList.toggle('on', !!state.on);
        power.textContent = state.on ? 'On' : 'Off';

        const badges = el('badges');
        badges.innerHTML = '';
        const add = (text, cls) => {
          const b = document.createElement('span');
          b.className = 'badge' + (cls ? ' ' + cls : '');
          b.textContent = text;
          badges.appendChild(b);
        };
        if (state.nextAlarm) add('Alarm ' + state.nextAlarm, 'alarm');
        if (state.away) add('Away');
        if (state.waterLow) add('Water low', 'warn');
        if (state.priming) add('Priming', 'alarm');
        if (state.hrv != null) add('HRV ' + Math.round(state.hrv) + ' ms');
        if (state.breathRate != null) add('Breath ' + Number(state.breathRate).toFixed(1) + '/min');
      }

      async function load(id) {
        try {
          state = await Homey.api('GET', '/state' + (id ? ('?id=' + encodeURIComponent(id)) : ''));
          currentId = state.id;
          render();
        } catch (e) {
          el('presenceLabel').textContent = 'Unavailable';
          el('badges').innerHTML = '<span class="badge warn">Unavailable</span>';
        }
      }

      async function setTemp(delta) {
        if (!state || state.target == null) return;
        const next = Math.max(13, Math.min(44, Number(state.target) + delta));
        state = await Homey.api('POST', '/temperature', { id: currentId, celsius: next });
        render();
      }

      el('down').addEventListener('click', () => setTemp(-0.5));
      el('up').addEventListener('click', () => setTemp(0.5));
      el('power').addEventListener('click', async () => {
        if (!state) return;
        state = await Homey.api('POST', '/power', { id: currentId, on: !state.on });
        render();
      });
      el('side').addEventListener('change', (ev) => load(ev.target.value));

      Homey.api('GET', '/sides').then((sides) => {
        const sel = el('side');
        sel.innerHTML = '';
        (sides || []).forEach((s) => {
          const opt = document.createElement('option');
          opt.value = s.id; opt.textContent = s.name;
          sel.appendChild(opt);
        });
        if (!sides || sides.length <= 1) sel.style.visibility = 'hidden';
        load(sides && sides[0] ? sides[0].id : null);
      }).catch(() => load(null));

      setInterval(() => load(currentId), 60000);
      Homey.ready();
    }
  </script>
</body>
</html>
